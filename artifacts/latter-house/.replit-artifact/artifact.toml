kind = "web"
previewPath = "/"
title = "Latter House Life Planner"
version = "1.0.0"
id = "artifacts/latter-house"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21838

[services.development]
run = "pnpm --filter @workspace/latter-house run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/latter-house", "run", "build" ]
publicDir = "artifacts/latter-house/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21838"
BASE_PATH = "/"
