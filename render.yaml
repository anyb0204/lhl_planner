services:
  - type: web
    name: lhl-planner
    env: node
    plan: free
    region: oregon
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/latter-house run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PROXY_URL
        sync: false
      - key: BASE_PATH
        value: ""
      - key: AI_MONTHLY_DOLLAR_LIMIT
        value: 25
      - key: AI_SOFT_LIMIT_PERCENT
        value: 80
      - key: AI_HARD_LIMIT_PERCENT
        value: 100
      - key: AI_LIMIT_TIMEZONE
        value: America/Chicago
