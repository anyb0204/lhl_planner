services:
  - type: web
    name: lhl-planner
    env: node
    plan: free
    region: oregon
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/latter-house run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      # Required at import by lib/integrations-openai-ai-server (the api-server
      # throws on boot if these are missing). Set real values in the Render
      # dashboard; e.g. AI_INTEGRATIONS_OPENAI_BASE_URL=https://api.openai.com/v1
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PROXY_URL
        sync: false
      - key: BASE_PATH
        value: ""
