<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Local AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #7c6af7;
    --accent-dim: #4a3f99;
    --text: #e8e8e8;
    --text-dim: #888;
    --user-bg: #2d2b4e;
    --ai-bg: #1a1a1a;
    --error: #e05252;
    --success: #52b788;
    --radius: 16px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .header-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; min-width: 0; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-dim); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--error);
    flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.ok { background: var(--success); }

  .btn-icon {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-sm);
    font-size: 18px;
    line-height: 1;
    transition: color .2s, background .2s;
  }
  .btn-icon:hover { color: var(--text); background: var(--surface2); }

  /* ── Model bar ── */
  .model-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .model-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  select {
    flex: 1;
    min-width: 120px;
    max-width: 220px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 8px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  .btn-sm {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .btn-sm:hover { color: var(--text); border-color: var(--accent); }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .message.user .avatar { background: var(--accent-dim); }
  .message.ai .avatar { background: var(--surface2); }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    position: relative;
  }
  .message.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }
  .message.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* Markdown-like styling inside bubbles */
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code {
    background: rgba(255,255,255,.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
  }
  .bubble pre {
    background: rgba(0,0,0,.4);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin-bottom: 2px; }
  .bubble strong { font-weight: 600; }
  .bubble em { font-style: italic; }
  .bubble h1, .bubble h2, .bubble h3 {
    margin: 8px 0 4px;
    font-size: 15px;
    font-weight: 600;
  }

  .copy-btn {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .2s;
  }
  .message.ai .bubble:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--text); }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: .3; transform: scale(.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* Empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 48px; opacity: .4; }
  .empty h2 { font-size: 18px; color: var(--text); margin-bottom: 4px; }
  .empty p { font-size: 14px; max-width: 280px; line-height: 1.5; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
  }
  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    color: var(--text-dim);
  }
  .suggestion:hover { border-color: var(--accent); color: var(--text); }

  /* ── Input area ── */
  .input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 6px 6px 16px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    font-family: inherit;
    padding: 3px 0;
  }
  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .15s, opacity .2s;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:disabled { opacity: .4; cursor: default; transform: none; }

  /* ── System prompt panel ── */
  .panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    animation: fadeIn .15s ease;
  }
  .panel.hidden { display: none; }

  .panel-inner {
    width: 100%;
    max-width: 780px;
    margin: 0 auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel textarea {
    width: 100%;
    height: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 13px;
    resize: vertical;
    color: var(--text);
  }

  .panel-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: flex-end;
  }

  .btn {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #6a5ce0; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }

  /* Error banner */
  .error-banner {
    background: rgba(224,82,82,.15);
    border: 1px solid rgba(224,82,82,.3);
    color: #f08080;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    margin: 8px 16px 0;
    display: none;
  }
  .error-banner.show { display: block; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <div class="header-title">Local AI</div>
      <div class="header-sub" id="statusText">Checking connection…</div>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <button class="btn-icon" id="settingsBtn" title="System prompt">⚙️</button>
    <button class="btn-icon" id="clearBtn" title="New conversation">🗑️</button>
  </header>

  <!-- Model bar -->
  <div class="model-bar">
    <span class="model-label">Model:</span>
    <select id="modelSelect">
      <option value="">Loading…</option>
    </select>
    <button class="btn-sm" id="refreshModels">↻ Refresh</button>
    <button class="btn-sm" id="pullModelBtn">+ Pull model</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <!-- Chat area -->
  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-icon">🤖</div>
      <h2>Your local AI</h2>
      <p>100% private. No internet required. Running entirely on your device.</p>
      <div class="suggestions" id="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">Explain quantum computing</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Write a Python function</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Summarize my notes</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Help me plan my week</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Message your local AI…"
        rows="1"
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>➤</button>
    </div>
  </div>
</div>

<!-- System prompt panel -->
<div class="panel hidden" id="settingsPanel">
  <div class="panel-inner">
    <div class="panel-title">
      System Prompt
      <button class="btn-icon" id="closeSettings">✕</button>
    </div>
    <textarea id="systemPrompt" placeholder="Give the AI a persona or instructions, e.g.: 'You are a helpful assistant. Be concise and direct. Never refuse to answer.'"></textarea>
    <div class="panel-actions">
      <button class="btn btn-ghost" id="clearSystemPrompt">Clear</button>
      <button class="btn btn-primary" id="saveSystemPrompt">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let messages = JSON.parse(localStorage.getItem('ai_messages') || '[]')
let systemPrompt = localStorage.getItem('ai_system_prompt') || ''
let currentModel = localStorage.getItem('ai_model') || ''
let isStreaming = false

const messagesEl = document.getElementById('messages')
const inputEl = document.getElementById('input')
const sendBtn = document.getElementById('sendBtn')
const emptyState = document.getElementById('emptyState')
const modelSelect = document.getElementById('modelSelect')

// ── Boot ──
async function init() {
  renderMessages()
  await loadModels()
  await checkHealth()
  // Poll health every 10s
  setInterval(checkHealth, 10000)
}

// ── Health ──
async function checkHealth() {
  const dot = document.getElementById('statusDot')
  const sub = document.getElementById('statusText')
  try {
    const r = await fetch('/api/health')
    const d = await r.json()
    if (d.ollama === 'connected') {
      dot.className = 'status-dot ok'
      sub.textContent = `Connected · ${d.models.length} model${d.models.length !== 1 ? 's' : ''}`
    } else {
      dot.className = 'status-dot'
      sub.textContent = 'Ollama not running — run: ollama serve'
    }
  } catch {
    dot.className = 'status-dot'
    sub.textContent = 'Server error'
  }
}

// ── Models ──
async function loadModels() {
  try {
    const r = await fetch('/api/models')
    const d = await r.json()
    const models = d.models || []
    modelSelect.innerHTML = models.length
      ? models.map(m => `<option value="${m.name}" ${m.name === currentModel ? 'selected' : ''}>${m.name}</option>`).join('')
      : '<option value="">No models installed</option>'
    if (!currentModel && models.length) currentModel = models[0].name
  } catch {
    modelSelect.innerHTML = '<option value="">Ollama offline</option>'
  }
}

modelSelect.addEventListener('change', () => {
  currentModel = modelSelect.value
  localStorage.setItem('ai_model', currentModel)
})

document.getElementById('refreshModels').addEventListener('click', loadModels)

document.getElementById('pullModelBtn').addEventListener('click', async () => {
  const name = prompt('Model name to pull (e.g. llama3.2, mistral, phi3:mini, gemma3:4b):')
  if (!name) return
  showError(`Pulling ${name}… this may take a few minutes.`)
  const res = await fetch('/api/pull', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: name.trim() })
  })
  const reader = res.body.getReader()
  const dec = new TextDecoder()
  while (true) {
    const { done, value } = await reader.read()
    if (done) break
    for (const line of dec.decode(value).split('\n')) {
      if (!line.startsWith('data: ')) continue
      try {
        const d = JSON.parse(line.slice(6))
        if (d.status) showError(`Pulling ${name}: ${d.status}`)
        if (d.status === 'success') {
          hideError()
          await loadModels()
          await checkHealth()
        }
      } catch {}
    }
  }
})

// ── Rendering ──
function renderMessages() {
  // Remove old message elements (keep empty state and any streaming bubble)
  const toRemove = messagesEl.querySelectorAll('.message')
  toRemove.forEach(el => el.remove())

  messages.forEach((msg, i) => {
    messagesEl.appendChild(buildBubble(msg.role, msg.content, i))
  })

  emptyState.style.display = messages.length === 0 ? 'flex' : 'none'
  scrollToBottom()
}

function buildBubble(role, content, id) {
  const wrap = document.createElement('div')
  wrap.className = `message ${role}`
  wrap.dataset.id = id

  const avatar = document.createElement('div')
  avatar.className = 'avatar'
  avatar.textContent = role === 'user' ? '🧑' : '🤖'

  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  bubble.innerHTML = renderMarkdown(content)

  if (role === 'assistant') {
    const copyBtn = document.createElement('button')
    copyBtn.className = 'copy-btn'
    copyBtn.textContent = 'copy'
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(content)
      copyBtn.textContent = 'copied!'
      setTimeout(() => copyBtn.textContent = 'copy', 1500)
    }
    bubble.appendChild(copyBtn)
  }

  wrap.appendChild(avatar)
  wrap.appendChild(bubble)
  return wrap
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // code blocks
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // unordered lists
    .replace(/^\* (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // line breaks → paragraphs
    .split('\n\n').map(p => p.includes('<h') || p.includes('<pre') || p.includes('<li') ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('')
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight
}

// ── Sending ──
async function send(text) {
  if (!text.trim() || isStreaming) return
  isStreaming = true
  sendBtn.disabled = true
  hideError()

  messages.push({ role: 'user', content: text })
  saveMessages()
  renderMessages()

  // Add streaming bubble
  emptyState.style.display = 'none'
  const streamWrap = document.createElement('div')
  streamWrap.className = 'message ai'
  streamWrap.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`
  messagesEl.appendChild(streamWrap)
  scrollToBottom()

  const bubble = streamWrap.querySelector('.bubble')
  let full = ''

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: currentModel,
        messages: messages.map(m => ({ role: m.role, content: m.content })),
        system: systemPrompt || undefined
      })
    })

    const reader = res.body.getReader()
    const dec = new TextDecoder()
    let gotFirstToken = false

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      for (const line of dec.decode(value, { stream: true }).split('\n')) {
        if (!line.startsWith('data: ')) continue
        const data = line.slice(6)
        if (data === '[DONE]') break
        try {
          const chunk = JSON.parse(data)
          if (chunk.error) { showError(chunk.error); break }
          if (chunk.token) {
            if (!gotFirstToken) { bubble.innerHTML = ''; gotFirstToken = true }
            full += chunk.token
            bubble.innerHTML = renderMarkdown(full)
            scrollToBottom()
          }
        } catch {}
      }
    }

    if (full) {
      messages.push({ role: 'assistant', content: full })
      saveMessages()
      renderMessages()
    } else {
      streamWrap.remove()
    }
  } catch (err) {
    showError('Connection error — is Ollama running? (ollama serve)')
    streamWrap.remove()
  }

  isStreaming = false
  sendBtn.disabled = false
  inputEl.focus()
}

function sendSuggestion(el) {
  inputEl.value = el.textContent
  adjustTextarea()
  sendBtn.disabled = false
  handleSend()
}

function handleSend() {
  const text = inputEl.value.trim()
  if (!text) return
  inputEl.value = ''
  adjustTextarea()
  sendBtn.disabled = true
  send(text)
}

sendBtn.addEventListener('click', handleSend)

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    handleSend()
  }
})

inputEl.addEventListener('input', () => {
  adjustTextarea()
  sendBtn.disabled = !inputEl.value.trim() || isStreaming
})

function adjustTextarea() {
  inputEl.style.height = 'auto'
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px'
}

// ── Clear ──
document.getElementById('clearBtn').addEventListener('click', () => {
  if (messages.length === 0) return
  if (confirm('Start a new conversation?')) {
    messages = []
    saveMessages()
    renderMessages()
  }
})

// ── System prompt panel ──
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('systemPrompt').value = systemPrompt
  document.getElementById('settingsPanel').classList.remove('hidden')
})

document.getElementById('closeSettings').addEventListener('click', () => {
  document.getElementById('settingsPanel').classList.add('hidden')
})

document.getElementById('saveSystemPrompt').addEventListener('click', () => {
  systemPrompt = document.getElementById('systemPrompt').value.trim()
  localStorage.setItem('ai_system_prompt', systemPrompt)
  document.getElementById('settingsPanel').classList.add('hidden')
})

document.getElementById('clearSystemPrompt').addEventListener('click', () => {
  document.getElementById('systemPrompt').value = ''
})

document.getElementById('settingsPanel').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsPanel')) {
    document.getElementById('settingsPanel').classList.add('hidden')
  }
})

// ── Persistence ──
function saveMessages() {
  // Keep last 200 messages to avoid storage bloat
  if (messages.length > 200) messages = messages.slice(-200)
  localStorage.setItem('ai_messages', JSON.stringify(messages))
}

// ── Errors ──
function showError(msg) {
  const el = document.getElementById('errorBanner')
  el.textContent = msg
  el.classList.add('show')
}
function hideError() {
  document.getElementById('errorBanner').classList.remove('show')
}

init()
</script>
</body>
</html>
